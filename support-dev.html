<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Support the Developer · SoulVerse</title>
  <link rel="stylesheet" href="./css/support-dev.css">
</head>
<body>

  <div class="support-card">
    <!-- Star Icon -->
    <svg class="support-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>

    <h1 class="support-title">Buy Me a Star</h1>
    <p class="support-subtitle">Support the soul behind the stars</p>

    <div class="qr-container">
      <img src="./assets/gcash-qr.jpg" alt="GCash QR Code" class="qr-code" />
      <p class="qr-label">Scan with GCash</p>
    </div>

    <div class="support-message">
      <svg class="heart-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none" width="16" height="16">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      Every little star helps the galaxy grow
    </div>

    <a href="index.html?showLanding=true" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back
    </a>
  </div>

</body>
</html>
